<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart College Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- User Selection Screen -->
    <div id="users-screen" class="users-screen">
        <h1 class="who-title">Who's tracking?</h1>
        <div class="users-container" id="users-grid">
            <!-- Populated dynamically -->
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h2 id="auth-title">Enter Password</h2>
            <form id="auth-form">
                <input type="hidden" id="auth-username">
                <input type="hidden" id="auth-mode" value="login">
                <div class="form-group" id="username-group" style="display:none;">
                    <input type="text" id="new-username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input type="password" id="auth-password" placeholder="Password" required>
                </div>
                <div id="auth-error" class="error-msg hidden"></div>
                <button type="submit" class="btn-primary" id="auth-submit">Login</button>
                <button type="button" class="btn-secondary" style="margin-top:0.5rem;" id="auth-cancel">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard Modal -->
    <div id="admin-modal" class="modal hidden">
        <div class="modal-content glass-card" style="max-width: 600px; width: 90%;">
            <h2><i data-lucide="shield"></i> Admin Dashboard</h2>
            <div class="admin-section">
                <h3>Users</h3>
                <ul id="admin-user-list" class="transactions">
                    <!-- Populated dynamically -->
                </ul>
            </div>
            <div class="admin-section" style="margin-top: 1rem;">
                <h3>Add User</h3>
                <form id="admin-add-user-form">
                    <div class="form-group">
                        <input type="text" id="admin-new-username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="admin-new-password" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-new-role">Role</label>
                        <select id="admin-new-role" required>
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Create User</button>
                </form>
                <div id="admin-error" class="error-msg hidden"></div>
            </div>
            <button type="button" class="btn-secondary" style="margin-top:1rem;" id="admin-close">Close</button>
        </div>
    </div>

    <div class="container glass-panel hidden" id="app-container">
        <header>
            <div class="header-content" style="justify-content: space-between; width: 100%;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <i data-lucide="graduation-cap" class="logo-icon"></i>
                    <h1>Smart College Expense Tracker</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span id="logged-in-user" style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;"></span>
                    <button id="admin-dashboard-btn" class="btn-primary hidden" style="width: auto; padding: 0.5rem 1rem;"><i data-lucide="shield"></i> Admin Panel</button>
                    <button id="switch-user-btn" class="btn-secondary" style="width: auto; padding: 0.5rem 1rem;"><i data-lucide="users"></i> Switch</button>
                </div>
            </div>
            <div class="summary-cards">
                <div class="card glass-card">
                    <h3>Total Balance</h3>
                    <h2 id="net-savings">₹0.00</h2>
                </div>
                <div class="card glass-card income-card">
                    <h3>Income</h3>
                    <h2 id="total-income">+₹0.00</h2>
                </div>
                <div class="card glass-card expense-card">
                    <h3>Expenses</h3>
                    <h2 id="total-expense">-₹0.00</h2>
                </div>
            </div>
            <div id="warning-message" class="warning-banner hidden">
                <i data-lucide="alert-triangle"></i>
                <span id="warning-text"></span>
            </div>
        </header>

        <main class="grid-layout">
            <!-- Left Column: Forms -->
            <div class="column">
                <div class="form-container glass-card">
                    <h2><i data-lucide="plus-circle"></i> Add Transaction</h2>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label>Type</label>
                            <div class="toggle-switch">
                                <input type="radio" id="type-expense" name="type" value="EXPENSE" checked>
                                <label for="type-expense" class="expense-label">Expense</label>
                                <input type="radio" id="type-income" name="type" value="INCOME">
                                <label for="type-income" class="income-label">Income</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date">
                        </div>
                        <div class="form-group">
                            <label for="description">Description (Optional)</label>
                            <input type="text" id="description" placeholder="What was this for?">
                        </div>
                        <button type="submit" class="btn-primary">Save Transaction</button>
                    </form>
                </div>

                <div class="form-container glass-card margin-top">
                    <h2><i data-lucide="target"></i> Set Budget</h2>
                    <form id="budget-form">
                        <div class="form-group">
                            <label for="budget-category">Category</label>
                            <select id="budget-category" required>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="budget-amount">Monthly Limit (₹)</label>
                            <input type="number" id="budget-amount" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <button type="submit" class="btn-secondary">Update Budget</button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Data -->
            <div class="column">
                <div class="data-section glass-card">
                    <h2><i data-lucide="bar-chart-2"></i> Spending vs Budget Forecast</h2>
                    <div style="position: relative; height:250px; width:100%; margin-bottom: 1rem;">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>

                <div class="data-section glass-card margin-top">
                    <h2><i data-lucide="pie-chart"></i> Smart Budget Summary</h2>
                    <div id="budget-breakdown" class="budget-list">
                        <!-- Populated dynamically -->
                        <div class="empty-state">Loading summary...</div>
                    </div>
                </div>

                <div class="data-section glass-card margin-top">
                    <h2><i data-lucide="list"></i> Recent Transactions</h2>
                    <div class="transaction-list-container">
                        <ul id="transaction-list" class="transactions">
                            <!-- Populated dynamically -->
                            <div class="empty-state">No transactions yet.</div>
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
